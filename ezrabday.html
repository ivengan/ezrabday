<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezra's Birthday Invitation 2026</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeInDown 1s ease-out;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
            letter-spacing: -0.05em;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-dim);
            font-weight: 300;
        }

        /* Card Section */
        .card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: center;
        }

        .info-item h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        .info-item p {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .location-link {
            color: var(--secondary);
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s;
        }

        .location-link:hover {
            color: white;
        }

        /* RSVP Form */
        h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .rsvp-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        input[type="text"], input[type="number"], textarea {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.6rem;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 0.75rem;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .radio-option input { display: none; }

        .radio-label {
            display: block;
            padding: 0.6rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .radio-option input:checked + .radio-label {
            background: var(--primary);
            border-color: var(--primary);
        }

        .radio-option.no input:checked + .radio-label {
            background: var(--accent);
            border-color: var(--accent);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 0.85rem;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        /* Map Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--surface);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            width: 90%;
            max-width: 320px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .modal h3 { margin-bottom: 1.5rem; font-size: 1.2rem; }

        .map-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .map-btn {
            padding: 1rem;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: background 0.3s;
        }

        .btn-google { background: #4285F4; }
        .btn-waze { background: #33CCFF; }
        .btn-close { background: transparent; border: 1px solid var(--text-dim); margin-top: 0.5rem; }

        /* Deadline Banner */
        #deadline-banner {
            display: none;
            background: rgba(244, 63, 94, 0.2);
            border: 2px dashed var(--accent);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        @media (max-height: 700px) {
            .hero h1 { font-size: 1.8rem; }
            .card { padding: 1.25rem; gap: 0.75rem; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>EZRA'S BIRTHDAY</h1>
        <p>A Galactic Celebration!</p>
    </div>

    <div class="card" id="invitation-card">
        <div class="info-grid">
            <div class="info-item">
                <h3>When</h3>
                <p>April 18, 2026</p>
                <p>2:00 PM</p>
            </div>
            <div class="info-item">
                <h3>Where</h3>
                <p class="location-link" onclick="openMapPicker()">Ezra's home sweet home</p>
                <p style="font-size: 0.7rem; color: var(--text-dim)">(Tap to navigate)</p>
            </div>
        </div>

        <div id="rsvp-container">
            <h2>Will you join us?</h2>
            <form action="https://formspree.io/f/ivengan123@gmail.com" method="POST" class="rsvp-form" id="rsvp-form">
                <div class="form-row">
                    <div class="input-group">
                        <label for="name">Guest Name</label>
                        <input type="text" id="name" name="name" placeholder="Name" required>
                    </div>
                    <div class="input-group">
                        <label for="parents">Parent(s)</label>
                        <input type="number" id="parents" name="parents" value="1" min="0" max="2" required>
                    </div>
                </div>

                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="attendance" value="Yes" checked>
                        <span class="radio-label">YES! I'M IN! 🚀</span>
                    </label>
                    <label class="radio-option no">
                        <input type="radio" name="attendance" value="No">
                        <span class="radio-label">SORRY, CAN'T 😢</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">SEND!</button>
                <p style="text-align: center; color: var(--text-dim); font-size: 0.7rem;">
                    RSVP by April 12
                </p>
            </form>
        </div>

        <div id="deadline-banner">
            <h3>RSVP CLOSED</h3>
            <p>We hope to see you next time!</p>
        </div>
    </div>

    <!-- Map Modal -->
    <div class="modal-overlay" id="mapModal">
        <div class="modal">
            <h3>Navigate with...</h3>
            <div class="map-options">
                <a href="https://www.google.com/maps/search/?api=1&query=2.2713214237008,102.53505347543722" target="_blank" class="map-btn btn-google">Google Maps</a>
                <a href="https://waze.com/ul?ll=2.2713214237008,102.53505347543722&navigate=yes" target="_blank" class="map-btn btn-waze">Waze</a>
                <button class="map-btn btn-close" onclick="closeMapPicker()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Deadline checking
        const deadlineDate = new Date('2026-04-13T00:00:00');
        if (new Date() > deadlineDate) {
            document.getElementById('rsvp-container').style.display = 'none';
            document.getElementById('deadline-banner').style.display = 'block';
        }

        // Map Modal controls
        function openMapPicker() { document.getElementById('mapModal').style.display = 'flex'; }
        function closeMapPicker() { document.getElementById('mapModal').style.display = 'none'; }

        // RSVP logic
        document.getElementById('rsvp-form').addEventListener('submit', function(e) {
            const attendance = document.querySelector('input[name="attendance"]:checked').value;
            if (attendance === 'Yes') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#6366f1', '#a855f7', '#f43f5e'] });
            }
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'SENDING...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
