<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezra's Birthday Invitation 2026</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --surface: rgba(15, 23, 42, 0.7); /* More transparent to see the cake */
            --text-main: #ffffff;
            --text-dim: #cbd5e1;
            --cake-base: #fef3c7;
            --cake-frosting: #fce7f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Center the whole group */
            gap: 1rem; /* New specific gap between Header and Card */
            overflow: hidden;
            padding: 1.5rem;
            position: relative;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .hero span {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: none;
            letter-spacing: 0.05em;
        }

        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem; /* Slightly larger */
            font-weight: 900; /* Maximum bold */
            background: linear-gradient(135deg, #ffffff, #a5b4fc, #f472b6, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0;
            line-height: 1.0; /* Tigher line height for rows */
            text-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Stronger shadow */
        }

        /* Card Section */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 3rem;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.8);
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* Better spacing between form elements */
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Cake Background (Inside Card) */
        .cake-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5); /* 1.5x larger */
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cake {
            width: 312px;
            height: 156px;
            background: var(--cake-base);
            border-radius: 15px 15px 5px 5px;
            box-shadow: 0 8px 0 #fde68a, inset 0 -6px 0 rgba(0,0,0,0.05);
            position: relative;
        }

        .frosting {
            position: absolute;
            top: -12px;
            left: -3%;
            width: 106%;
            height: 47px;
            background: var(--cake-frosting);
            border-radius: 20px;
            box-shadow: 0 6px 0 #fbcfe8;
        }

        /* Candles */
        .candles {
            position: absolute;
            top: -50px; /* Adjusted for larger cake */
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 38px;
        }

        .candle {
            width: 10px;
            height: 35px;
            border-radius: 3px;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -24px; /* Adjusted for larger flame */
            left: 50%;
            transform: translateX(-50%);
            width: 14px; /* Bigger flame (from 10px in earlier versions) */
            height: 24px; /* Taller flame */
            background: radial-gradient(#fff, #ffd700, #ffa500, #ff4500);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff4500, 0 0 10px #ffd700, 0 0 40px rgba(255, 69, 0, 0.4);
            animation: flicker 0.15s infinite alternate ease-in-out;
            filter: blur(0.5px);
        }

        @keyframes flicker {


        @media (max-height: 750px) {
            .card { gap: 0.75rem; padding: 1.25rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero span { font-size: 0.8rem; }
            .cake { width: 160px; height: 80px; }
            .candles { top: -20px; }
        }
    </style>
</head>
<body>


    <div class="hero">
        <span>You have been invited to</span>
        <h1>EZRA'S BIRTHDAY</h1>
        <h1>CELEBRATION!</h1>
    </div>


    <div class="card" id="invitation-card">
        <!-- Background Cake Overlay -->
        <div class="cake-bg">
            <div class="candles">
                <div class="candle c1"><div class="flame"></div></div>
                <div class="candle c2"><div class="flame"></div></div>
                <div class="candle c3"><div class="flame"></div></div>
                <div class="candle c4"><div class="flame"></div></div>
                <div class="candle c5"><div class="flame"></div></div>
                <div class="candle c6"><div class="flame"></div></div>
            </div>
            <div class="cake"><div class="frosting"></div></div>
        </div>


        <div class="info-grid">
            <div class="info-item">
                <h3>When</h3>
                <p>April 18, 2026</p>
                <p>3:30 PM</p>
            </div>
            <div class="info-item">
                <h3>Where</h3>
                <p style="font-size: 1.1rem; font-weight: 800; color: #ffffff;">Ezra's home sweet home</p>
            </div>
        </div>


        <div id="rsvp-container" style="display: flex; flex-direction: column; gap: 1rem;">
            <h2>Will you join us?</h2>
            <form action="#" method="POST" class="rsvp-form" id="rsvp-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: grid; grid-template-columns: 2.2fr 1fr; column-gap: 0.75rem; row-gap: 4px;">
                    <label for="name" style="font-size: 0.75rem; font-weight: 800; color: #a5b4fc;">Guest Name</label>
                    <label for="parents" style="font-size: 0.75rem; font-weight: 800; color: #a5b4fc;">Total attending guest(s)</label>
                    
                    <input type="text" id="name" name="name" placeholder="Name" required>
                    <select id="parents" name="parents" style="background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 1rem; padding: 0.8rem; color: white; font-size: 1rem; font-weight: 700; width: 100%;" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                </div>


                <div style="display: flex; flex-direction: column; gap: 4px; margin-top: -0.25rem;">
                    <label for="contact" style="font-size: 0.75rem; font-weight: 800; color: #a5b4fc;">📞 Person to contact (Phone)</label>
                    <input type="tel" id="contact" name="contact" placeholder="012-3456789" required>
                </div>


                <input type="hidden" name="attendance" id="attendance-value" value="Yes">


                <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 0.75rem; margin-top: 0.5rem;">
                    <button type="button" class="btn-yes" onclick="submitRSVP('Yes')" id="btn-yes">YES! 🚀</button>
                    <button type="button" class="btn-no" onclick="submitRSVP('No')" id="btn-no">SORRY, I CAN'T 😢</button>
                </div>
                
                <p style="text-align: center; color: #cbd5e1; font-size: 0.75rem; font-weight: 800;">
                    Please RSVP by April 9
                </p>
            </form>
        </div>


        <div id="deadline-banner" style="display: none; text-align: center; padding: 1.5rem;">
            <h3 style="color: var(--accent); font-size: 1.5rem; font-weight: 900;">RSVP CLOSED</h3>
            <p>See you at the next one!</p>
        </div>
    </div>
