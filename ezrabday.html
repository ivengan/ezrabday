<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezra's Birthday Invitation 2026</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --surface: rgba(15, 23, 42, 0.7); /* More transparent to see the cake */
            --text-main: #ffffff;
            --text-dim: #cbd5e1;
            --cake-base: #fef3c7;
            --cake-frosting: #fce7f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Center the whole group */
            gap: 1rem; /* New specific gap between Header and Card */
            overflow: hidden;
            padding: 1.5rem;
            position: relative;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .hero span {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: none;
            letter-spacing: 0.05em;
        }

        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem; /* Slightly larger */
            font-weight: 900; /* Maximum bold */
            background: linear-gradient(135deg, #ffffff, #a5b4fc, #f472b6, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0;
            line-height: 1.0; /* Tigher line height for rows */
            text-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Stronger shadow */
        }

        /* Card Section */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 3rem;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.8);
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* Better spacing between form elements */
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Cake Background (Inside Card) */
        .cake-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0.4; /* 20% more transparent (from 0.6) */
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cake {
            width: 312px; /* 20% bigger (from 260px) */
            height: 156px; /* Scaling height proportionally */
            background: var(--cake-base);
            border-radius: 15px 15px 5px 5px;
            box-shadow: 0 8px 0 #fde68a, inset 0 -6px 0 rgba(0,0,0,0.05);
            position: relative;
        }

        .frosting {
            position: absolute;
            top: -12px;
            left: -6px;
            width: 324px; /* 20% bigger (from 270px) */
            height: 47px; /* Scaling height proportionally */
            background: var(--cake-frosting);
            border-radius: 20px;
            box-shadow: 0 6px 0 #fbcfe8;
        }

        /* Candles */
        .candles {
            position: absolute;
            top: -50px; /* Adjusted for larger cake */
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 38px;
        }

        .candle {
            width: 10px;
            height: 35px;
            border-radius: 3px;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -24px; /* Adjusted for larger flame */
            left: 50%;
            transform: translateX(-50%);
            width: 14px; /* Bigger flame (from 10px in earlier versions) */
            height: 24px; /* Taller flame */
            background: radial-gradient(#fff, #ffd700, #ffa500, #ff4500);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff4500, 0 0 10px #ffd700, 0 0 40px rgba(255, 69, 0, 0.4);
            animation: flicker 0.15s infinite alternate ease-in-out;
            filter: blur(0.5px);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); filter: brightness(1) blur(0.5px); }
            15% { transform: translateX(-54%) scale(1.2) rotate(3deg); filter: brightness(1.2) blur(0.3px); }
            30% { transform: translateX(-46%) scale(0.9) rotate(-1deg); filter: brightness(0.9) blur(0.6px); }
            45% { transform: translateX(-52%) scale(1.15) rotate(4deg); filter: brightness(1.3) blur(0.2px); }
            60% { transform: translateX(-48%) scale(1) rotate(-4deg); filter: brightness(1.1) blur(0.4px); }
            75% { transform: translateX(-53%) scale(1.1) rotate(2deg); filter: brightness(1.2) blur(0.3px); }
            90% { transform: translateX(-47%) scale(0.95) rotate(-2deg); filter: brightness(0.8) blur(0.7px); }
            100% { transform: translateX(-51%) scale(1.25) rotate(5deg); filter: brightness(1.4) blur(0.1px); }
        }

        .c1 .flame { animation: flicker 0.6s infinite alternate ease-in-out; }
        .c2 .flame { animation: flicker 0.7s infinite alternate ease-in-out; animation-delay: -0.1s; }
        .c3 .flame { animation: flicker 0.8s infinite alternate ease-in-out; animation-delay: -0.2s; }
        .c4 .flame { animation: flicker 0.65s infinite alternate ease-in-out; animation-delay: -0.3s; }
        .c5 .flame { animation: flicker 0.75s infinite alternate ease-in-out; animation-delay: -0.4s; }
        .c6 .flame { animation: flicker 0.9s infinite alternate ease-in-out; animation-delay: -0.5s; }

        .c1 { background: #ff595e; } .c2 { background: #ffca3a; } .c3 { background: #8ac926; }
        .c4 { background: #1982c4; } .c5 { background: #6a4c93; } .c6 { background: #f15bb5; }

        /* Form Content Overlay Styling */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 1.25rem;
            border-radius: 1.5rem;
            backdrop-filter: blur(5px);
        }

        .info-item h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #a5b4fc;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .info-item p {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }


        h2 {
            font-size: 1.6rem;
            text-align: center;
            color: #ffffff;
            font-weight: 900;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        input[type="text"], input[type="number"] {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            padding: 0.8rem;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
        }

        .radio-label {
            display: block;
            padding: 0.8rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            font-weight: 900;
            font-size: 0.9rem;
            color: white;
        }

        .btn-yes {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            width: 100%;
        }

        .btn-no {
            background: rgba(244, 63, 94, 0.2);
            color: white;
            border: 2px solid rgba(244, 63, 94, 0.4);
            border-radius: 9999px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-yes:hover, .btn-no:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .btn-no:hover { background: rgba(244, 63, 94, 0.3); }

        .calendar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 800;
            margin-top: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--primary);
            background: rgba(99, 102, 241, 0.1);
            border-radius: 999px;
            transition: all 0.3s;
        }

        .calendar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 800;
            margin-top: 0.5rem;
            padding: 0.5rem;
            border: 1px solid rgba(165, 180, 252, 0.3);
            border-radius: 999px;
            transition: all 0.3s;
        }

        .calendar-btn:hover {
            background: rgba(165, 180, 252, 0.1);
            border-color: #a5b4fc;
        }



        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @media (max-height: 750px) {
            .card { gap: 0.75rem; padding: 1.25rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero span { font-size: 0.8rem; }
            .cake { width: 160px; height: 80px; }
            .candles { top: -20px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <span>You have been invited to</span>
        <h1>EZRA'S BIRTHDAY</h1>
        <h1>CELEBRATION!</h1>
    </div>

    <div class="card" id="invitation-card">
        <!-- Background Cake Overlay -->
        <div class="cake-bg">
            <div class="candles">
                <div class="candle c1"><div class="flame"></div></div>
                <div class="candle c2"><div class="flame"></div></div>
                <div class="candle c3"><div class="flame"></div></div>
                <div class="candle c4"><div class="flame"></div></div>
                <div class="candle c5"><div class="flame"></div></div>
                <div class="candle c6"><div class="flame"></div></div>
            </div>
            <div class="cake"><div class="frosting"></div></div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <h3>When</h3>
                <p>April 18, 2026</p>
                <p>3:30 PM</p>
            </div>
            <div class="info-item">
                <h3>Where</h3>
                <p style="font-size: 1.1rem; font-weight: 800; color: #ffffff;">Ezra's home sweet home</p>
            </div>
        </div>

        <div id="rsvp-container" style="display: flex; flex-direction: column; gap: 1rem;">
            <h2>Will you join us?</h2>
            <form action="#" method="POST" class="rsvp-form" id="rsvp-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: grid; grid-template-columns: 2.2fr 1fr; gap: 0.75rem;">
                    <div style="display: flex; flex-direction: column; gap: 4px;">
                        <label for="name" style="font-size: 0.75rem; font-weight: 800; color: #a5b4fc;">Guest Name</label>
                        <input type="text" id="name" name="name" placeholder="Name" required>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 4px;">
                        <label for="parents" style="font-size: 0.75rem; font-weight: 800; color: #a5b4fc;">Parents</label>
                        <input type="number" id="parents" name="parents" value="1" min="0" max="2" required>
                    </div>
                </div>

                <input type="hidden" name="attendance" id="attendance-value" value="Yes">

                <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 0.75rem; margin-top: 0.5rem;">
                    <button type="button" class="btn-yes" onclick="submitRSVP('Yes')" id="btn-yes">YES! 🚀</button>
                    <button type="button" class="btn-no" onclick="submitRSVP('No')" id="btn-no">SORRY, I CAN'T 😢</button>
                </div>
                
                <p style="text-align: center; color: #cbd5e1; font-size: 0.75rem; font-weight: 800;">
                    Please RSVP by April 9
                </p>
            </form>
        </div>

        <div id="deadline-banner" style="display: none; text-align: center; padding: 1.5rem;">
            <h3 style="color: var(--accent); font-size: 1.5rem; font-weight: 900;">RSVP CLOSED</h3>
            <p>See you at the next one!</p>
        </div>
    </div>



    <script>
        // Premium 12-Second Confetti Sequence
        function startCelebration() {
            const end = Date.now() + (12 * 1000); // 12 seconds
            const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#f15bb5'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        window.addEventListener('DOMContentLoaded', startCelebration);

        // Deadline logic
        if (new Date() > new Date('2026-04-10T00:00:00')) {
            document.getElementById('rsvp-container').style.display = 'none';
            document.getElementById('deadline-banner').style.display = 'block';
        }


        // New RSVP Submission Logic
        function submitRSVP(response) {
            const form = document.getElementById('rsvp-form');
            const nameInput = document.getElementById('name');
            const attendanceInput = document.getElementById('attendance-value');
            
            // Check validation
            if (!nameInput.value.trim()) {
                nameInput.style.borderColor = 'var(--accent)';
                alert("Please insert your name first! 🙏");
                return;
            }

            // Set the outcome
            attendanceInput.value = response;

            if (response === 'No') {
                alert("Oops, we hope to see you on next event!");
                // No form.submit() here as backend is removed
                return;
            }

            // "Yes" Response Path
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#6366f1', '#a855f7', '#f43f5e'] });
            document.getElementById('btn-yes').innerText = 'GREAT! SEE YOU SOON! 🎈';
            document.getElementById('btn-no').style.display = 'none';
            
            // Redirect to reminders after a brief moment to show success
            setTimeout(() => {
                window.location.href = 'reminder.html';
            }, 1800);
        }
    </script>
</body>
</html>
