name: RSVP Reminder

on:
  schedule:
    # Run at 00:00 UTC on April 10th
    - cron: '0 0 10 4 *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check Year and Send Reminder
        uses: actions/github-script@v6
        with:
          script: |
            const now = new Date();
            // Only run in 2026
            if (now.getFullYear() !== 2026) {
              console.log("Not 2026, skipping.");
              return;
            }
            
            // Create a GitHub Issue as a notification reminder
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🎉 BIRTHDAY REMINDER: Check Ezra's Guest List in Google Sheets!",
              body: `Hi Ezra's family!\n\nToday is April 10th, 2026. The RSVP deadline has passed.\n\nPlease check your **Google Sheet "Ezra's Birthday RSVPs"** to view the final list of guests for the birthday party on the 18th!`
            });
